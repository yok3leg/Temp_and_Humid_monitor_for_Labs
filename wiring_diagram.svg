<svg width="680" height="560" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
<rect x="0" y="0" width="680" height="560" fill="#ffffff"/>
<style>
  .lbl { font-family: Arial, sans-serif; font-size: 13px; fill: #111827; }
  .ttl { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #111827; }
  .sm  { font-family: Arial, sans-serif; font-size: 12px; fill: #374151; }
  .box { fill: #f3f4f6; stroke: #6b7280; stroke-width: 1; }
</style>

<!-- COMPONENTS -->
<rect class="box" x="50" y="130" width="170" height="300" rx="10"/>
<text class="ttl" x="135" y="158" text-anchor="middle">ESP32 DevKit</text>
<text class="lbl" x="212" y="182" text-anchor="end">3V3</text>
<text class="lbl" x="212" y="220" text-anchor="end">GND</text>
<text class="lbl" x="212" y="272" text-anchor="end">GPIO4</text>
<text class="lbl" x="212" y="336" text-anchor="end">GPIO21</text>
<text class="lbl" x="212" y="376" text-anchor="end">GPIO22</text>

<rect class="box" x="440" y="110" width="130" height="120" rx="10"/>
<text class="ttl" x="505" y="135" text-anchor="middle">DHT11</text>
<text class="lbl" x="450" y="147" text-anchor="start">VCC</text>
<text class="lbl" x="450" y="177" text-anchor="start">DATA</text>
<text class="lbl" x="450" y="207" text-anchor="start">GND</text>

<rect class="box" x="420" y="300" width="180" height="140" rx="10"/>
<text class="ttl" x="510" y="324" text-anchor="middle">OLED 1.3" SH1106</text>
<text class="lbl" x="430" y="337" text-anchor="start">VCC</text>
<text class="lbl" x="430" y="367" text-anchor="start">GND</text>
<text class="lbl" x="430" y="397" text-anchor="start">SCL</text>
<text class="lbl" x="430" y="427" text-anchor="start">SDA</text>

<!-- WIRES -->
<g fill="none" stroke="#DC2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M220 178 L260 178"/>
  <path d="M260 143 L260 333"/>
  <path d="M260 143 L440 143"/>
  <path d="M260 333 L420 333"/>
</g>
<g fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M220 216 L290 216"/>
  <path d="M290 203 L290 363"/>
  <path d="M290 203 L440 203"/>
  <path d="M290 363 L420 363"/>
</g>
<g fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M220 268 L320 268 L320 173 L440 173"/>
</g>
<g fill="none" stroke="#0D9488" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M220 332 L350 332 L350 423 L420 423"/>
</g>
<g fill="none" stroke="#D97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M220 372 L380 372 L380 393 L420 393"/>
</g>

<!-- 10k PULL-UP -->
<g fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M400 143 L400 147 L407 149 L393 152 L407 155 L393 158 L407 161 L400 163 L400 173"/>
</g>
<circle cx="400" cy="143" r="3" fill="#DC2626"/>
<circle cx="400" cy="173" r="3" fill="#7C3AED"/>
<text class="sm" x="386" y="162" text-anchor="end">10k</text>

<!-- PIN DOTS -->
<circle cx="440" cy="143" r="3" fill="#DC2626"/>
<circle cx="420" cy="333" r="3" fill="#DC2626"/>
<circle cx="220" cy="178" r="3" fill="#DC2626"/>
<circle cx="440" cy="203" r="3" fill="#6B7280"/>
<circle cx="420" cy="363" r="3" fill="#6B7280"/>
<circle cx="220" cy="216" r="3" fill="#6B7280"/>
<circle cx="440" cy="173" r="3" fill="#7C3AED"/>
<circle cx="220" cy="268" r="3" fill="#7C3AED"/>
<circle cx="420" cy="423" r="3" fill="#0D9488"/>
<circle cx="220" cy="332" r="3" fill="#0D9488"/>
<circle cx="420" cy="393" r="3" fill="#D97706"/>
<circle cx="220" cy="372" r="3" fill="#D97706"/>

<!-- LEGEND -->
<text class="sm" x="50" y="478" text-anchor="start">Wire colors</text>
<g stroke-width="3" stroke-linecap="round">
  <line x1="50" y1="498" x2="78" y2="498" stroke="#DC2626"/>
  <line x1="190" y1="498" x2="218" y2="498" stroke="#6B7280"/>
  <line x1="320" y1="498" x2="348" y2="498" stroke="#7C3AED"/>
  <line x1="50" y1="524" x2="78" y2="524" stroke="#0D9488"/>
  <line x1="190" y1="524" x2="218" y2="524" stroke="#D97706"/>
</g>
<text class="sm" x="86" y="502" text-anchor="start">3V3 power</text>
<text class="sm" x="226" y="502" text-anchor="start">GND</text>
<text class="sm" x="356" y="502" text-anchor="start">GPIO4 - DHT data</text>
<text class="sm" x="86" y="528" text-anchor="start">GPIO21 - SDA</text>
<text class="sm" x="226" y="528" text-anchor="start">GPIO22 - SCL</text>
</svg>
